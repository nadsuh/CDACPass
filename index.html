<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Image Target AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <!-- Particle System Component -->
  <script src="https://cdn.jsdelivr.net/gh/IdeaSpaceVR/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Appears when the image target is detected -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- RED GLOWING TEXT -->
      <a-text
        value="Specialized Training Program in Social Media Innovations with AI and AR\nNadeem SUHOOTOORAH\nRehad Suhootoorah\n06 May 2026 to 19 May 2026\nC-DAC Mohali"
        position="0 0.8 0"
        align="center"
        color="#FF0000"
        width="4"
        material="color: #FF0000; emissive: #FF0000; emissiveIntensity: 3">
      </a-text>

      <!-- RED STAR SPARKLES -->
      <!-- Uses point texture to ensure compatibility if star texture fails -->
      <a-entity
        position="0 0 0"
        particle-system="
          preset: dust;
          particleCount: 500;
          color: #FF0000, #FF4444, #FFAAAA;
          size: 0.02, 0.08;
          velocityValue: 0 0.10 0;
          velocitySpread: 0.50 0.50 0.50;
          accelerationValue: 0 0.01 0;
          opacity: 1, 0;
          maxAge: 3;
          blending: additive;">
      </a-entity>

      <!-- RED GLOWING SPINNING TORUS -->
      <a-torus
        position="0 0 0"
        radius="0.4"
        radius-tubular="0.03"
        material="color: #FF0000;
                  emissive: #FF0000;
                  emissiveIntensity: 3;
                  transparent: true;
                  opacity: 0.8"
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 2000">
      </a-torus>

      <!-- RED PULSING OUTER RING -->
      <a-ring
        position="0 0 0"
        rotation="-90 0 0"
        radius-inner="0.48"
        radius-outer="0.52"
        material="color: #FF0000;
                  emissive: #FF0000;
                  transparent: true;
                  opacity: 0.5"
        animation="property: scale;
                   from: 1 1 1;
                   to: 1.3 1.3 1.3;
                   dur: 1500;
                   loop: true"
        animation__fade="property: material.opacity;
                         from: 0.6;
                         to: 0;
                         dur: 1500;
                         loop: true">
      </a-ring>

    </a-entity>
  </a-scene>
</body>
</html>
