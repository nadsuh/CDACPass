<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Image Target AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <!-- Particle System Component -->
  <script src="https://cdn.jsdelivr.net/gh/IdeaSpaceVR/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Appears when the image target is detected -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Multi-colored glowing text lines -->
      <a-text
        value="Specialized Training Program"
        position="0 1.20 0"
        align="center"
        color="#FF0000"
        width="5"
        material="color: #FF0000; emissive: #FF0000; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="Social Media Innovations"
        position="0 0.95 0"
        align="center"
        color="#FFA500"
        width="5"
        material="color: #FFA500; emissive: #FFA500; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="with AI and AR"
        position="0 0.70 0"
        align="center"
        color="#FFFF00"
        width="4.5"
        material="color: #FFFF00; emissive: #FFFF00; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="Nadeem SUHOOTOORAH"
        position="0 0.35 0"
        align="center"
        color="#00FF00"
        width="4.5"
        material="color: #00FF00; emissive: #00FF00; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="Rehad Suhootoorah"
        position="0 0.05 0"
        align="center"
        color="#00FFFF"
        width="4.5"
        material="color: #00FFFF; emissive: #00FFFF; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="06 May 2026 to 19 May 2026"
        position="0 -0.30 0"
        align="center"
        color="#0000FF"
        width="5"
        material="color: #0000FF; emissive: #0000FF; emissiveIntensity: 3">
      </a-text>

      <a-text
        value="C-DAC Mohali"
        position="0 -0.60 0"
        align="center"
        color="#FF00FF"
        width="4.5"
        material="color: #FF00FF; emissive: #FF00FF; emissiveIntensity: 3">
      </a-text>

      <!-- Sparkling particles -->
      <a-entity
        position="0 0.3 0"
        particle-system="
          preset: dust;
          particleCount: 500;
          color: #FFFFFF, #FFD700, #00FF00, #00FFFF;
          size: 0.02, 0.08;
          velocityValue: 0 0.10 0;
          velocitySpread: 0.50 0.50 0.50;
          accelerationValue: 0 0.01 0;
          opacity: 1, 0;
          maxAge: 3;
          blending: additive;">
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
